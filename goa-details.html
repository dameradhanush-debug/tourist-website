<!DOCTYPE html>
<html lang="en">
<head>
<title>Goa</title>
<style>
body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:linear-gradient(135deg,#1f1c2c,#928dab);
color:white;
text-align:center;
padding:30px 20px;
}
.box{
max-width:850px;
margin:0 auto;
background:rgba(255,255,255,0.12);
padding:25px;
border-radius:14px;
box-shadow:0 8px 24px rgba(0,0,0,0.3);
}
img{
width:100%;
max-width:650px;
height:auto;
border-radius:12px;
margin:20px 0;
}
p{
font-size:18px;
line-height:1.7;
}
</style>
</head>
<body>
<div class="box">
<h1>Goa</h1>
<img src="images/goa.jpg" alt="Goa">
<p>Goa is famous for its clean beaches, water sports, and lively nightlife. It is one of the most popular holiday destinations in India. Visitors also enjoy its Portuguese-style churches and seafood.</p>
</div>
</body>
</html>
