<!DOCTYPE html>
<html lang="en">
<head>
<title>Manali</title>
<style>
body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:linear-gradient(135deg,#1f1c2c,#928dab);
color:white;
text-align:center;
padding:30px 20px;
}
.box{
max-width:850px;
margin:0 auto;
background:rgba(255,255,255,0.12);
padding:25px;
border-radius:14px;
box-shadow:0 8px 24px rgba(0,0,0,0.3);
}
img{
width:100%;
max-width:650px;
height:auto;
border-radius:12px;
margin:20px 0;
}
p{
font-size:18px;
line-height:1.7;
}
</style>
</head>
<body>
<div class="box">
<h1>Manali</h1>
<img src="images/manali.jpg" alt="Manali">
<p>Manali is a beautiful hill station surrounded by snow-covered mountains. It is popular for adventure sports, scenic valleys, and cool weather. Travelers visit for trekking, skiing, and peaceful mountain views.</p>
</div>
</body>
</html>
